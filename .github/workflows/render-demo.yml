name: Render demo video

on:
  push:
    paths:
      - 'demo-video/**'
      - '.github/workflows/render-demo.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install npm deps
        working-directory: demo-video
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: demo-video
        run: npx playwright install chromium

      - name: Run capture
        working-directory: demo-video
        env:
          DEMO_OWUI_URL: ${{ secrets.DEMO_OWUI_URL }}
          DEMO_EMAIL: ${{ secrets.DEMO_EMAIL }}
          DEMO_PASS: ${{ secrets.DEMO_PASS }}
        run: node capture.mjs

      - name: Upload to demo-video-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing asset if present
          gh release view demo-video-latest --json assets -q '.assets[].name' 2>/dev/null | while read name; do
            gh release delete-asset demo-video-latest "$name" --yes || true
          done
          # Create release if it doesn't exist
          gh release create demo-video-latest --title "Demo Video (latest)" \
            --notes "Auto-captured Playwright demo session. Updated on every push." \
            --latest=false 2>/dev/null || true
          # Upload
          gh release upload demo-video-latest \
            demo-video/out/demo.webm \
            --clobber
